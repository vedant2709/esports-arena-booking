server {
	listen 80;

	# Where the built React files live (we copy dist/ here)
	root /usr/share/nginx/html;
	index index.html;

	# Performance
      	gzip on;
      	gzip_types text/css application/javascript application/json image/svg+xml;
      	gzip_min_length 1024;

	# Security headers
      	add_header X-Frame-Options "SAMEORIGIN" always;
      	add_header X-Content-Type-Options "nosniff" always;
      	add_header Referrer-Policy "strict-origin-when-cross-origin" always;

	# Allow larger uploads (your app accepts file uploads)
      	client_max_body_size 10M;

	# Cache hashed build assets aggressively (safe — filenames change on rebuild)
      	location /assets/ {
          	expires 1y;
          	add_header Cache-Control "public, immutable";
      	}

	# JOB 2 — reverse proxy: forward /api/* to the backend container.
	# "backend" is the compose service name (Docker DNS resolves it).
	location /api/ {
		resolver 127.0.0.11 valid=10s;          # Docker's internal DNS, re-check every 10s
		set $backend_upstream http://backend:5001;  # a VARIABLE forces per-request resolution
		proxy_pass $backend_upstream;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		add_header X-Served-By $upstream_addr always;   # shows which replica handled i
	}

	location / {
		try_files $uri $uri/ /index.html
		add_header Cache-Control "no-cache";
	}
}
